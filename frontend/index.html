<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <h1>🤖 LLM Chat</h1>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Login</button>
                    <button class="tab-btn" data-tab="register">Register</button>
                </div>
                <form id="login-form" class="auth-form active">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Login</button>
                </form>
                <form id="register-form" class="auth-form">
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
                <div class="divider">or</div>
                <button id="github-login-btn" class="btn-github">
                    <i class="ri-github-fill"></i> Continue with GitHub
                </button>
            </div>
        </div>

        <div id="chat-screen" class="screen hidden">
            <aside id="sidebar">
                <div class="sidebar-header">
                    <button id="new-chat-btn" class="btn-sidebar">
                        <i class="ri-add-line"></i> New Chat
                    </button>
                </div>
                <div id="chat-list" class="chat-list"></div>
                <button id="logout-btn" class="btn-logout">
                    <i class="ri-logout-box-line"></i> Logout
                </button>
            </aside>
            <main id="main-content">
                <div id="messages-container"></div>
                <div id="input-area">
                    <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" class="btn-send">
                        <i class="ri-send-plane-fill"></i>
                    </button>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
